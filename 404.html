<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page introuvable — Le Pacte</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Hanken+Grotesk:wght@400;600&family=Amiri&display=swap" rel="stylesheet" />
<style>
  /* Page autonome : aucune dépendance d'asset (servie par GitHub Pages à n'importe quel chemin). */
  body{ margin:0; min-height:100svh; display:flex; align-items:center; justify-content:center;
    background:#03091d; color:#f4f0e7; font-family:"Hanken Grotesk", system-ui, sans-serif; text-align:center; }
  main{ padding:2rem; max-width:34rem; }
  .num{ font-family:"Marcellus", Georgia, serif; font-size:clamp(4.5rem, 16vw, 7.5rem); line-height:1; color:#d4af62; }
  .rule{ display:flex; align-items:center; gap:.9rem; margin:1.4rem auto 1.8rem; max-width:240px; color:#d4af62; }
  .rule::before, .rule::after{ content:""; height:1px; flex:1; background:linear-gradient(90deg, transparent, #9d7b3a, transparent); }
  h1{ font-family:"Marcellus", Georgia, serif; font-weight:400; font-size:1.5rem; margin:0 0 .5rem; }
  p[lang="ar"]{ font-family:"Amiri", serif; font-size:1.2rem; margin:.3rem 0 2.2rem; color:#b9bdcb; }
  a.btn{ display:inline-flex; flex-direction:column; align-items:center; gap:.1rem;
    background:#d4af62; color:#03091d; text-decoration:none; font-weight:600;
    padding:.85rem 2.2rem; border-radius:99px; }
  a.btn:hover{ background:#e3c27d; }
  a.btn span[lang="ar"]{ font-family:"Amiri", serif; font-size:.95rem; font-weight:400; }
</style>
</head>
<body>
<main>
  <p class="num">404</p>
  <div class="rule" aria-hidden="true">✦</div>
  <h1>Cette page est introuvable.</h1>
  <p lang="ar" dir="rtl">هذه الصفحة غير موجودة.</p>
  <a class="btn" href="https://hecrabatbusinessschool.github.io/lepacte.ma/">
    <span>Retour à l'accueil</span>
    <span lang="ar" dir="rtl">الرجوع إلى الرئيسية</span>
  </a>
</main>
</body>
</html>
